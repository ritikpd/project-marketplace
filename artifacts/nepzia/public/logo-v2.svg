<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <linearGradient id="dg" x1="78" y1="308" x2="322" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF1F3D"/>
      <stop offset="0.55" stop-color="#C4186A"/>
      <stop offset="1" stop-color="#8C1AA0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#E8293A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8293A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg2" x1="80" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF1F3D"/>
      <stop offset="1" stop-color="#8C1AA0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="480" fill="#0A0A0C"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="210" rx="155" ry="115" fill="url(#glow)"/>

  <!-- N body — diagonal gradient for drama -->
  <path d="M78,308 L78,108 L136,108 L264,265 L264,108 L322,108 L322,308 L264,308 L136,150 L136,308 Z" fill="url(#dg)"/>

  <!-- Subtle highlight on N diagonal face -->
  <path d="M136,108 L158,108 L264,252 L264,265 L242,265 L136,125 Z" fill="white" fill-opacity="0.07"/>

  <!-- Sharper mountain peaks (white) -->
  <path d="M68,128 L92,90 L125,44 L158,80 L200,14 L242,80 L275,48 L308,90 L332,128 L332,108 L68,108 Z" fill="#FFFFFF"/>

  <!-- NEPZIA wordmark — Z in gradient red -->
  <text x="200" y="374"
        font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
        font-weight="800" font-size="40" letter-spacing="12"
        fill="white" text-anchor="middle">NEP<tspan fill="#FF1F3D">Z</tspan>IA</text>

  <rect x="80" y="392" width="240" height="2" rx="1" fill="url(#tg2)"/>
</svg>
