<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <linearGradient id="rg" x1="78" y1="0" x2="322" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF2244"/>
      <stop offset="1" stop-color="#D0186C"/>
    </linearGradient>
    <linearGradient id="shine" x1="78" y1="108" x2="322" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6688" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trg" x1="75" y1="0" x2="325" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF2244"/>
      <stop offset="1" stop-color="#D0186C"/>
    </linearGradient>
  </defs>

  <rect width="400" height="480" fill="#0D0D0F"/>

  <!-- N body -->
  <path d="M78,308 L78,108 L136,108 L264,265 L264,108 L322,108 L322,308 L264,308 L136,150 L136,308 Z" fill="url(#rg)"/>
  <!-- Shine overlay -->
  <path d="M78,308 L78,108 L136,108 L264,265 L264,108 L322,108 L322,308 L264,308 L136,150 L136,308 Z" fill="url(#shine)"/>

  <!-- 5-peak Himalayan range (white) — more authentic Nepal silhouette -->
  <path d="M55,130 L78,108 L96,90 L115,98 L130,60 L152,86 L172,76 L200,18 L228,76 L248,86 L270,60 L285,98 L304,90 L322,108 L345,130 L345,108 L55,108 Z" fill="#FFFFFF"/>

  <!-- NEPZIA — ultra-wide tracking -->
  <text x="200" y="374"
        font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
        font-weight="800" font-size="38" letter-spacing="16"
        fill="white" text-anchor="middle">NEPZIA</text>

  <!-- Two small red accent dashes flanking the text -->
  <rect x="75" y="392" width="18" height="2" rx="1" fill="#FF2244"/>
  <rect x="307" y="392" width="18" height="2" rx="1" fill="#D0186C"/>

  <!-- Gradient rule between accents -->
  <rect x="98" y="392" width="204" height="2" rx="1" fill="url(#trg)"/>
</svg>
